<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>事例一覧 | MedAI HUB</title>
    <link rel="stylesheet" href="index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;600;800&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .filter-section {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
            flex-wrap: wrap;
            background: var(--surface);
            padding: 24px;
            border-radius: var(--radius-md);
            border: 1px solid var(--border);
        }
        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .filter-group label {
            font-size: 0.875rem;
            font-weight: 700;
            color: var(--text-muted);
        }
        .filter-select {
            padding: 10px 16px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: var(--bg);
            min-width: 180px;
        }
        .search-box {
            position: relative;
            flex-grow: 1;
        }
        .search-box input {
            width: 100%;
            padding: 10px 40px 10px 16px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            height: 42px;
        }
        .search-box i {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <nav>
                <a href="index.html" class="logo">
                    <i data-lucide="activity"></i>
                    MedAI HUB
                </a>
                <ul class="nav-links">
                    <li><a href="list.html" class="nav-link active" style="color: var(--primary)">事例を見る</a></li>
                    <li><a href="ranking.html" class="nav-link">ランキング</a></li>
                    <li><a href="service.html" class="nav-link">導入支援</a></li>
                </ul>
                <div class="nav-actions">
                    <a href="post.html" class="btn btn-primary">
                        <i data-lucide="plus-circle"></i>
                        事例を投稿する
                    </a>
                </div>
            </nav>
        </div>
    </header>

    <main class="container">
        <header style="padding: 60px 0 20px;">
            <h1>活用事例ライブラリ</h1>
            <p style="color: var(--text-muted); margin-top: 12px;">全国の医療機関から集まったAI活用の知恵</p>
        </header>

        <section class="filter-section">
            <div class="search-box">
                <input type="text" placeholder="キーワードで検索 (例: ChatGPT, 紹介状...)">
                <i data-lucide="search"></i>
            </div>
            <div class="filter-group">
                <label>AIツール</label>
                <select class="filter-select">
                    <option value="">すべて</option>
                    <option value="chatgpt">ChatGPT</option>
                    <option value="claude">Claude</option>
                    <option value="gemini">Gemini</option>
                </select>
            </div>
            <div class="filter-group">
                <label>カテゴリ</label>
                <select class="filter-select">
                    <option value="">すべて</option>
                    <option value="admin">事務効率化</option>
                    <option value="clinical">診療支援</option>
                    <option value="patient">患者サービス</option>
                </select>
            </div>
        </section>

        <div class="card-grid" id="all-cases-grid">
            <!-- Cards injected by JS -->
        </div>

        <div style="text-align: center; margin-top: 60px;">
            <button class="btn btn-secondary">さらに読み込む</button>
        </div>
    </main>

    <footer class="container" style="margin-top: 100px; padding: 40px 0; border-top: 1px solid var(--border);">
        <p style="text-align: center; color: var(--text-muted);">&copy; 2026 MedAI HUB</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
    <script src="app.js"></script>
    <script>
        lucide.createIcons();
        document.addEventListener('DOMContentLoaded', () => {
            renderCards('all-cases-grid', mockCases); // Using same mock data for now
        });
    </script>
</body>
</html>
