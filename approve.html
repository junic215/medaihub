<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>投稿承認 | MedAI HUB</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="container" style="padding: 100px 0; text-align: center;">
        <div class="glass-card" id="status-card">
            <h2 id="status-title">承認処理中...</h2>
            <p id="status-desc">しばらくお待ちください。</p>
            <div style="margin-top: 32px;">
                <a href="index.html" class="btn btn-primary">トップページへ戻る</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
    <script>
        async function approve() {
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id');
            const token = urlParams.get('token');
            const title = document.getElementById('status-title');
            const desc = document.getElementById('status-desc');

            if (!id || !token) {
                title.innerText = 'エラー';
                desc.innerText = '無効な承認リンクです。';
                return;
            }

            try {
                // Call the RPC function we defined in schema
                const { data, error } = await window.medai.client.rpc('approve_case_with_token', {
                    case_id: id,
                    token: token
                });

                if (error) throw error;

                if (data === true) {
                    title.innerText = '承認完了！';
                    desc.innerText = '事例が正常に公開されました。';
                    title.style.color = 'var(--accent)';
                } else {
                    title.innerText = '失敗';
                    desc.innerText = '承認に失敗しました。すでに承認されているか、リンクが正しくありません。';
                }
            } catch (err) {
                console.error(err);
                title.innerText = 'エラー';
                desc.innerText = '処理中にエラーが発生しました: ' + err.message;
            }
        }

        document.addEventListener('DOMContentLoaded', approve);
    </script>
</body>
</html>
