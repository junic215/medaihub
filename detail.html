<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>事例詳細 | MedAI HUB</title>
    <link rel="stylesheet" href="index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;600;800&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .detail-header {
            padding: 60px 0 40px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 40px;
        }
        .detail-meta {
            display: flex;
            gap: 24px;
            color: var(--text-muted);
            margin-bottom: 16px;
            font-weight: 600;
            flex-wrap: wrap;
        }
        .detail-layout {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 60px;
        }
        .content-box {
            background: var(--surface);
            padding: 40px;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
        }
        .content-box h2 {
            font-size: 1.5rem;
            margin: 32px 0 16px;
        }
        .content-box p {
            margin-bottom: 16px;
            font-size: 1.1rem;
        }
        .reaction-bar {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--surface);
            padding: 12px 24px;
            border-radius: 100px;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border);
            display: flex;
            gap: 16px;
            z-index: 1000;
            width: max-content;
            max-width: 90vw;
        }
        .reaction-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-muted);
        }
        .reaction-btn:hover {
            color: var(--primary);
        }
        .reaction-btn i {
            width: 20px;
        }
        .sidebar-card {
            background: var(--primary-light);
            border: 1px solid var(--primary);
            padding: 32px;
            border-radius: var(--radius-lg);
            position: sticky;
            top: 100px;
        }
        @media (max-width: 1024px) {
            .detail-layout { grid-template-columns: 1fr; }
            .sidebar-card { position: static; }
            .content-box { padding: 24px; }
        }
    </style>
</head>
<body>
    <header class="container">
        <nav>
            <a href="index.html" class="logo">
                <i data-lucide="activity"></i>
                MedAI HUB
            </a>
            <div class="nav-actions">
                <a href="list.html" class="btn btn-secondary">一覧へ戻る</a>
            </div>
        </nav>
    </header>

    <main class="container">
        <div id="detail-loading" style="padding: 100px; text-align: center;">読み込み中...</div>
        
        <div id="detail-content" style="display: none;">
            <div class="detail-header">
                <div class="detail-meta">
                    <span id="meta-category"></span>
                    <span>•</span>
                    <span id="meta-date"></span>
                    <span>•</span>
                    <span style="display: flex; align-items: center; gap: 4px;"><i data-lucide="eye" style="width:16px"></i> <span id="meta-views"></span> views</span>
                </div>
                <h1 id="detail-title"></h1>
                <div style="display: flex; align-items: center; gap: 12px; margin-top: 24px;">
                    <div style="width: 40px; height: 40px; background: var(--border); border-radius: 50%; display: flex; align-items: center; justify-content: center;">
                        <i data-lucide="user"></i>
                    </div>
                    <div>
                        <div id="detail-author" style="font-weight: 700;"></div>
                        <div id="detail-hospital" style="color: var(--text-muted); font-size: 0.875rem;"></div>
                    </div>
                </div>
            </div>

            <div class="detail-layout">
                <div class="detail-main">
                    <div class="content-box">
                        <div style="width: 100%; border-radius: var(--radius-md); overflow: hidden; margin-bottom: 32px;">
                          <img id="detail-image" src="" alt="Case Image" style="width: 100%; height: auto; display: block;">
                        </div>
                        
                        <h2>解決した課題 / 背景</h2>
                        <p id="detail-body" style="white-space: pre-wrap;"></p>

                        <h2>使用したAIツール</h2>
                        <p><strong id="detail-tool"></strong></p>
                    </div>
                </div>

                <div class="detail-sidebar">
                    <div class="sidebar-card">
                        <h3>AI導入でお困りですか？</h3>
                        <p style="margin: 16px 0; color: var(--text-main);">MedAI HUBが、貴院の業務効率化を直接サポートします。この事例のようなシステムを導入したい方は、お気軽にご相談ください。</p>
                        <a href="service.html" class="btn btn-primary" style="width: 100%; justify-content: center;">詳しく見る</a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div class="reaction-bar">
        <button class="reaction-btn" onclick="alert('リクエストを受け付けました！')">
            <i data-lucide="thumbs-up"></i>
            <span>いいね</span>
        </button>
        <button class="reaction-btn" onclick="alert('リクエストを受け付けました！')">
            <i data-lucide="flame"></i>
            <span>最高！</span>
        </button>
        <button class="reaction-btn" onclick="alert('リクエストを受け付けました！')">
            <i data-lucide="lightbulb"></i>
            <span>マネしたい</span>
        </button>
        <div style="width: 1px; background: var(--border); margin: 0 8px;"></div>
        <button class="reaction-btn" onclick="alert('シェア機能は準備中です')">
            <i data-lucide="share-2"></i>
            <span>シェア</span>
        </button>
        <div style="width: 1px; background: var(--border); margin: 0 8px;"></div>
        <button class="reaction-btn" style="color: #ef4444;" onclick="adminDelete()">
            <i data-lucide="trash-2"></i>
            <span>削除</span>
        </button>
    </div>

    <footer style="padding: 100px 0;">
        <p style="text-align: center; color: var(--text-muted);">&copy; 2026 MedAI HUB</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
    <script src="app.js"></script>
    <script>
        lucide.createIcons();

        async function loadDetail() {
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id');
            if (!id) {
                window.location.href = 'index.html';
                return;
            }

            if (!window.medai.client) {
                console.error("Supabase client not found");
                return;
            }

            const { data, error } = await window.medai.client
                .from('cases')
                .select('*')
                .eq('id', id)
                .single();

            if (data) {
                document.getElementById('detail-loading').style.display = 'none';
                document.getElementById('detail-content').style.display = 'grid';

                document.getElementById('detail-title').innerText = data.title;
                document.getElementById('meta-category').innerText = data.category;
                document.getElementById('meta-views').innerText = data.views || 0;
                document.getElementById('meta-date').innerText = new Date(data.created_at).toLocaleDateString();
                
                // Privacy toggles
                document.getElementById('detail-author').innerText = data.show_author ? data.author_name : "非公開";
                document.getElementById('detail-hospital').innerText = data.show_hospital ? data.hospital_name : "非公開";
                
                // Detailed sections
                const bodyHtml = `
                    <div class="content-section">
                        <h3>1. 解決したかった課題</h3>
                        <p>${data.content_goal || ''}</p>
                    </div>
                    <div class="content-section">
                        <h3>2. どのように解決したか</h3>
                        <p>${data.content_how || ''}</p>
                    </div>
                    <div class="content-section">
                        <h3>3. どのような効果があったか</h3>
                        <p>${data.content_impact || ''}</p>
                    </div>
                    ${data.content_other ? `
                    <div class="content-section">
                        <h3>4. その他（補足等）</h3>
                        <p>${data.content_other}</p>
                    </div>` : ''}
                `;
                document.getElementById('detail-body').innerHTML = bodyHtml;
                document.getElementById('detail-tool').innerText = data.tool;

                const img = document.getElementById('detail-image');
                img.src = data.image_url || getRandomDefaultImage(getIndexFromId(data.id));
                
                // 閲覧数を増やす
                window.medai.client.rpc('increment_views', { case_id: id });
            }
 else {
                document.getElementById('detail-loading').innerText = '事例が見つかりませんでした。';
            }
            lucide.createIcons();
        }

        async function adminDelete() {
            const pwd = prompt('管理者パスワードを入力してください：');
            if (!pwd) return;

            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id');

            const { data, error } = await window.medai.client.rpc('delete_case_with_password', {
                target_id: id,
                input_password: pwd
            });

            if (error) {
                alert('エラーが発生しました: ' + error.message);
                return;
            }

            if (data === true) {
                alert('事例を削除しました。');
                window.location.href = 'index.html';
            } else {
                alert('パスワードが正しくありません。');
            }
        }

        document.addEventListener('DOMContentLoaded', loadDetail);
    </script>
</body>
</html>
